<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 Oszilloskop</title>

    <link rel="stylesheet" href="css/pico.min.css">
    <link rel="stylesheet" href="css/indexStyle.css">
    <link rel="stylesheet" href="css/oscilloscopes.css">

    <script src="js/smoothie.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/fetch-sensors.js"></script>
    <script src="js/oscilloscopes.js"></script>
</head>
<body>
<main class="container">

    <div style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
        <input type="file" id="display-update-upload" accept=".bin">
        <button id="upload-btn" style="width: auto; margin-bottom: 0;">Upload</button>
    </div>

    <div class="dashboard-grid" id="grid-container">
        <!-- <article class="tile-4x4"> -->
        <!--     <header><strong>Combined Sensor Oscilloscope</strong></header> -->
        <!--     <div class="chart-wrapper" id="wrapper"> -->
        <!--         <canvas id="global-canvas"></canvas> -->
        <!--     </div> -->
        <!-- </article> -->

        <article class="tile-4x1">
            <header>Add Sensor</header>
            <select id="sensor-select"></select>
            <button id="add-sensor-btn">Add</button>
        </article>

    </div>

    <script>
        const uploadFileBtn = document.getElementById('upload-btn');
        const addSensorBtn = document.getElementById('add-sensor-btn');
        const sensorSelect = document.getElementById('sensor-select');
        const gridContainer = document.getElementById('grid-container');

        uploadFileBtn.addEventListener('click', async () => {
            const displayUpdateUpload = document.getElementById('display-update-upload');
            if (displayUpdateUpload.files.length === 0) {
                alert("Please select a file first");
                return;
            }

            websocket.send('prepare-display-update');

            // Get the file
            const file = displayUpdateUpload.files[0];

            // Upload the file
            try {
                // Die Datei wird als roher Body gesendet (einfacher für den ESP als Multipart-Formdata)
                const response = await fetch('/display-update-upload', {
                    method: 'POST',
                    body: file
                });

                if (response.ok) {
                    console.log("Display update upload succeeded!");
                } else {
                    console.error("Display update upload failed with status:", response.status);
                }
            } catch (error) {
                console.error("Display update upload failed with network error:", error);
            }
        });

        addSensorBtn.addEventListener('click', () => {
            const selectedOption = sensorSelect.options[sensorSelect.selectedIndex];
            if (!selectedOption || selectedOption.value === "") {
                return;
            }

            const sensorName = selectedOption.text;
            const sensorId = selectedOption.value;

            const newTile = document.createElement('article');
            newTile.className = 'tile-2x2';

            newTile.innerHTML = `
                <div id="${sensorId}" class="tile-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <header style="margin: 0; border: none; padding: 0;">${sensorName}</header>
                    <button class="delete-btn outline secondary" style="width: auto; margin: 0; padding: 2px 8px;">✕</button>
                </div>
                <div class="chart-wrapper">
                    <canvas class="small-smoothie-chart" width="100%" height="100%"></canvas>
                </div>
            `;

            newTile.querySelector('.delete-btn').addEventListener('click', () => {
                websocket.send('remove-sensor:' + sensorId);
                delete sensorSeriesMap[sensorId];
                newTile.remove();
            });

            gridContainer.appendChild(newTile);

            initSmallScope(newTile.querySelector('.small-smoothie-chart'), sensorId)

            websocket.send('add-sensor:' + sensorId);
        });
    </script>
</main>
</body>
</html>
