<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 Oszilloskop</title>

    <link rel="stylesheet" href="css/pico.min.css">
    <link rel="stylesheet" href="css/indexStyle.css">

    <script src="js/smoothie.js"></script>
    <script src="js/websocket.js"></script>
</head>
<body>
<main class="container">

    <div class="dashboard-grid" id="grid-container">

        <article class="tile-4x4">
            <header><strong>Combined Sensor Oscilloscope</strong></header>
            <div class="chart-wrapper" id="wrapper">
                <canvas id="global-canvas"></canvas>
            </div>
        </article>

        <article class="tile-4x1">
            <header>Add Sensor</header>
            <select id="sensor-select">
            </select>
            <button id="add-sensor-btn">Add</button>
        </article>

        <article class="tile-2x2">
            <div class="tile-header" style="display: flex; justify-content: space-between; align-items: center;">
                <header style="margin: 0; border: none; padding: 0;">Kachel 1</header>
                <button class="delete-btn outline secondary" style="width: auto; margin: 0; padding: 2px 8px;">✕
                </button>
            </div>
            <p>Statische Kachel ohne Chart</p>
        </article>

    </div>
</main>
</body>
</html>
