<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 Oszilloskop</title>

    <!-- Pico CSS -->
    <link rel="stylesheet" href="pico.min.css">
    <!-- Chart.js für das Oszilloskop -->
    <script src="chart.js"></script>

    <style>
        /* Oszilloskop-Look: Schwarzer Hintergrund, leuchtende Farben */
        canvas {
            background-color: #111;
            border-radius: 8px;
        }
        .controls {
            margin-top: 1rem;
        }
        .active-badges span {
            margin-right: 0.5rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<main class="container">
    <h2>Sensor-Verlauf</h2>

    <!-- Oszilloskop Bereich -->
    <article>
        <canvas id="sensorChart" height="100"></canvas>
    </article>

    <!-- Steuerungsbereich (Unten) -->
    <article class="controls">
        <!-- Pico CSS 'grid' platziert Elemente nebeneinander -->
        <div class="grid">
            <select id="sensor-select">
                <option value="temperatur" data-color="#ff6384">Temperatur (°C)</option>
                <option value="feuchtigkeit" data-color="#36a2eb">Luftfeuchtigkeit (%)</option>
                <option value="licht" data-color="#cc65fe">Helligkeit (Lux)</option>
            </select>
            <button id="add-btn" onclick="addSensor()">+ Sensor hinzufügen</button>
        </div>

        <!-- Anzeige, welche Sensoren gerade aktiv sind -->
        <div id="active-list" class="active-badges" style="margin-top: 1rem;">
            <strong>Aktiv: </strong> <span id="badge-container">Keine</span>
        </div>
    </article>
</main>

<script>
    // --- Chart Initialisierung ---
    const ctx = document.getElementById('sensorChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // Zeitstempel auf der X-Achse
            datasets: [] // Hier landen die Linien der ausgewählten Sensoren
        },
        options: {
            responsive: true,
            animation: { duration: 0 }, // Animation aus für direkten Oszilloskop-Effekt
            scales: {
                x: { display: true, title: { display: true, text: 'Zeit' } },
                y: { display: true }
            },
            elements: {
                line: { tension: 0.4, borderWidth: 2 }, // Leicht geschwungene Linien
                point: { radius: 0 } // Punkte ausblenden für reinen Linien-Look
            }
        }
    });

    const activeSensors = new Map(); // Speichert aktive Sensoren (ID -> Name)
    const MAX_DATA_POINTS = 30; // Wie viele Punkte auf dem Oszilloskop bleiben

    // --- Sensor hinzufügen ---
    function addSensor() {
        const select = document.getElementById('sensor-select');
        const option = select.options[select.selectedIndex];
        const sensorId = option.value;
        const sensorName = option.text;
        const color = option.getAttribute('data-color');

        if (activeSensors.has(sensorId)) {
            alert("Sensor ist bereits aktiv!");
            return;
        }

        // Zum Chart als neues Dataset hinzufügen
        chart.data.datasets.push({
            label: sensorName,
            id: sensorId,
            borderColor: color,
            data: []
        });
        chart.update();

        // In die Liste aufnehmen und UI aktualisieren
        activeSensors.set(sensorId, sensorName);
        updateActiveBadges();
    }

    function updateActiveBadges() {
        const container = document.getElementById('badge-container');
        if (activeSensors.size === 0) {
            container.innerText = "Keine";
            return;
        }
        container.innerHTML = '';
        activeSensors.forEach((name, id) => {
            container.innerHTML += `<kbd>${name}</kbd> `; // <kbd> für Badge-Look in Pico
        });
    }

    // --- Daten vom ESP32 abrufen (Loop) ---
    setInterval(async () => {
        if (activeSensors.size === 0) return; // Nichts tun, wenn kein Sensor aktiv

        // Aktuelle Zeit für die X-Achse
        const now = new Date();
        const timeString = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
        chart.data.labels.push(timeString);

        // Alte X-Achsen-Werte abschneiden (Oszilloskop wandert nach links)
        if (chart.data.labels.length > MAX_DATA_POINTS) {
            chart.data.labels.shift();
        }

        // Alle aktiven Sensoren parallel abfragen
        for (let dataset of chart.data.datasets) {
            try {
                // ECHTE ESP32 ABFRAGE:
                // const response = await fetch(`/api/read?sensor=${dataset.id}`);
                // const value = parseFloat(await response.text());

                // ZUR DEMONSTRATION (Bitte für den echten ESP32 durch die zwei Zeilen oben ersetzen):
                const value = Math.random() * 20 + 20;

                dataset.data.push(value);

                // Alte Y-Werte abschneiden
                if (dataset.data.length > MAX_DATA_POINTS) {
                    dataset.data.shift();
                }
            } catch (e) {
                console.error("Fehler beim Abrufen von " + dataset.id, e);
            }
        }

        chart.update();
    }, 1000); // Jede Sekunde aktualisieren
</script>
</body>
</html>
